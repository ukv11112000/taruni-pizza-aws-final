<div class="container">

<div  class="row text-center grid-list" >

    <div class=" col-lg-3 col-md-4 col-sm-5 card"  *ngFor="let pizza of filteredPizzas">
        <div class="img-thumbnail" style="width: 27rem;">
            <div class="container1 card-body">
                <img src={{pizza.url}} height=150px width=250px  (click)="enlargePizza(pizza)">
                <div class="bottom-left">{{ pizza.price | currency:'USD' }}</div>
                <div class="top-left" *ngIf="pizza.type==='1'"><img src="/assets/photos/veg.png" alt="/assets/photos/non-veg" hight="20px" width="20px"></div>
                <div class="top-left" *ngIf="pizza.type==='2'"><img src="/assets/photos/nonveg.jpg" alt="/assets/photos/non-veg" hight="20px" width="20px"></div>
            </div>

            <div class="caption">
                <h4>{{pizza.name|titlecase}}</h4>

                <p>
                    {{pizza.description}}
                </p>

                <div class="components">
                <span>
                    <select ngModel (ngModelChange)="size(pizza,$event)" [value]="pizza.size"  >
                        <option disabled selected value> medium </option>
                        <!-- <option >medium</option> -->
                        <option >large</option>
                        <option >small</option>
                    </select>
                    <div class="quantity">
                        <button type="button" (click)="minus(pizza)"><i class="fa fa-minus"></i></button>
                        <input type="text" value="{{pizza.quantity}}" size="5">
                        <button type="button" (click)="plus(pizza)"><i class="fa fa-plus"></i></button>
                    </div>

                </span>


                <button class="btn btn-success" (click)="placeOrder(pizza)">Add to Cart</button>
                <button *ngIf="permission"  (click)="deletePizza(pizza.id)" class="trash"><span class="glyphicon glyphicon-trash" ></span></button>
                <button *ngIf='permission' (click)="editPizza(pizza)" class="edit"><span class="glyphicon glyphicon-edit" ></span></button>
            </div>
            </div>
        </div>
    </div>
  </div>

</div>
