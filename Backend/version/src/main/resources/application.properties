spring.application.name=taruni-pizza-backend

server.port=${PORT:5000}

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:intern}
jwt.expirationDateInMs=${JWT_EXPIRATION_MS:3600000}
jwt.refreshExpirationDateInMs=${JWT_REFRESH_EXPIRATION_MS:86400000}

# ===============================
# CORS
# ===============================
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://localhost:3000,https://*.amplifyapp.com}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.root=INFO

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=false
spring.mvc.pathmatch.matching-strategy=ant_path_matcher